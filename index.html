<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ban's Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f8f1e7;
    color:#5a4632;
}

header{
    background:#e6d5b8;
    text-align:center;
    padding:25px 15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

header h1{
    font-size:40px;
    margin-bottom:15px;
    font-weight:900;
}

nav a{
    text-decoration:none;
    color:#5a4632;
    font-weight:bold;
    margin:0 10px;
    padding:8px 14px;
    border-radius:6px;
    transition:0.3s;
}

nav a:hover{
    background:#d8c3a5;
    color:#000;
}

.content{
    max-width:900px;
    margin:60px auto;
    background:#fffaf3;
    padding:50px 30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.intro{
    font-size:28px;
    line-height:1.8;
    margin-bottom:30px;
}

.name{
    display:block;
    font-size:38px;
    font-weight:900;
    color:#b18d5d;
    margin-bottom:15px;
}

.quote{
    font-size:22px;
    font-style:italic;
    color:#7a654e;
    font-weight:bold;
}

footer{
    text-align:center;
    background:#e6d5b8;
    padding:18px;
    margin-top:50px;
    font-weight:bold;
}

@media(max-width:768px){

header h1{
    font-size:30px;
}

nav a{
    display:block;
    margin:8px auto;
    width:160px;
}

.content{
    margin:30px 15px;
    padding:30px 20px;
}

.intro{
    font-size:22px;
}

.name{
    font-size:30px;
}

.quote{
    font-size:18px;
}

}
</style>

</head>

<body>

<header>
    <h1>Ban's Portfolio</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about me.html">About Me</a>
        <a href="project.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="content">

    <p class="intro">
        <span class="name">Irvin Jhon J. Claveria</span>
        I am passionate about exploring new ideas and learning new skills every day.
    </p>

    <p class="quote">
        "I WILL ALWAYS LOVE YOU" <br>
        1 John 4:16
    </p>

</section>

<footer>
    <p>Created with passion by Ban</p>
</footer>

</body>
</html>
